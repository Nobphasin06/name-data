version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: name-data-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: name_data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: name-data-backend
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      DB_NAME: name_data
      DB_PORT: 5432
      PORT: 3000
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: name-data-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
