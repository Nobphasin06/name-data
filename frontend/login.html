<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Name Data</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-panel {
            max-width: 400px;
            width: 100%;
            padding: 30px;
        }
        .auth-panel h2 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .auth-links {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="glass-panel auth-panel">
        <h2>เข้าสู่ระบบ</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">อีเมล</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" style="width: 100%; justify-content: center;">เข้าสู่ระบบ</button>
        </form>
        <div class="auth-links">
            ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        redirectIfLoggedIn();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            btn.textContent = 'กำลังเข้าสู่ระบบ...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    setTokens(data.accessToken, data.refreshToken);
                    Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', showConfirmButton: false, timer: 1500 }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    Swal.fire('ข้อผิดพลาด', data.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
                }
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                btn.textContent = 'เข้าสู่ระบบ';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
